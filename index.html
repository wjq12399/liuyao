<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六爻 · 玄鉴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   玄鉴 · OBSIDIAN ORACLE
   设计: 东方神秘主义 × 现代极简科技 · 暗黑新中式
   ============================================================ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06060c;
  --surface:rgba(14,14,24,0.7);
  --surface-hover:rgba(18,18,30,0.8);
  --gold:#d4a745;
  --gold-bright:#f0d078;
  --gold-dim:#8a7030;
  --gold-glow:rgba(212,167,69,0.25);
  --cinnabar:#c05048;
  --cinnabar-glow:rgba(200,70,50,0.3);
  --text:#b0a898;
  --text-bright:#e0d8c8;
  --text-dim:#706858;
  --text-muted:#484030;
  --border:rgba(255,255,255,0.05);
  --border-gold:rgba(200,160,60,0.12);
  --radius:8px;
}

html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
  font-weight:300;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  -webkit-text-size-adjust:100%;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
  cursor:crosshair;
}

/* ============================================================
   CANVAS 粒子层
   ============================================================ */
#particleCanvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

/* ============================================================
   内容层
   ============================================================ */
#app{position:relative;z-index:10}

/* ── 导航 ── */
.nav{
  display:flex;justify-content:center;align-items:center;
  padding:1.5rem 2rem;
  position:relative;z-index:20;
}
.nav-logo{
  font-family:"Ma Shan Zheng",cursive;
  font-size:1.8rem;color:var(--gold);
  letter-spacing:0.2em;font-weight:400;
  text-shadow:0 0 40px var(--gold-glow);
  text-decoration:none;
}

/* ── 主区域 ── */
.main-content{
  max-width:720px;
  margin:0 auto;
  padding:0 1.5rem 4rem;
  display:flex;flex-direction:column;align-items:center;
}

/* ============================================================
   铜钱区 · 核心视觉焦点
   ============================================================ */
.coin-stage{
  position:relative;
  width:100%;max-width:420px;
  display:flex;align-items:center;justify-content:center;
  margin:1rem auto 2rem;
  perspective:800px;
}
.coin-stage::before{
  content:'';
  position:absolute;inset:-40px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,160,50,0.06) 0%,transparent 60%);
  animation:auraPulse 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes auraPulse{
  0%,100%{transform:scale(1);opacity:0.4}
  50%{transform:scale(1.12);opacity:0.8}
}

.coins-row{
  display:flex;align-items:center;justify-content:center;
  gap:0.8rem;perspective:800px;
}
.coin-3d{
  width:100px;height:100px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.1s ease-out;
  will-change:transform;
}
.coin-3d .face{
  position:absolute;inset:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;
  overflow:hidden;
}
.coin-3d .front{
  background:radial-gradient(circle at 44% 36%,
    #fcf4d8 0%,#f2de90 4%,#e4c858 14%,
    #d4b038 26%,#b89020 42%,#987018 55%,
    #785810 70%,#5a4008 100%);
  border:2.5px solid #705810;
  box-shadow:
    0 0 40px rgba(200,160,50,0.2),
    0 3px 14px rgba(0,0,0,0.4),
    inset 0 1px 2px rgba(255,255,220,0.2);
}
/* 内圈线 */
.coin-3d .front::before{
  content:'';
  position:absolute;inset:10px;border-radius:50%;
  border:1.2px solid rgba(80,50,10,0.3);
  pointer-events:none;z-index:1;
}
/* 方孔 */
.coin-hole{
  position:absolute;
  width:24px;height:24px;
  background:var(--bg);
  z-index:2;
  box-shadow:
    inset 0 2px 6px rgba(0,0,0,0.8),
    0 0 0 1.5px rgba(80,50,10,0.4),
    0 0 0 3px rgba(60,35,5,0.2);
  transform:rotate(45deg);
}
/* 四字 */
.coin-char-top,.coin-char-bottom,.coin-char-left,.coin-char-right{
  position:absolute;
  font-family:"KaiTi","STKaiti","SimSun",serif;
  font-size:0.9rem;font-weight:700;
  color:#2a1808;
  text-shadow:0 1px 0 rgba(255,255,200,0.2);
  z-index:3;pointer-events:none;
}
.coin-char-top{top:17px}
.coin-char-bottom{bottom:17px}
.coin-char-left{left:20px}
.coin-char-right{right:20px}

.coin-3d .back{
  background:radial-gradient(circle at 44% 36%,
    #e0d8c8 0%,#d0c0a0 4%,#b8a478 14%,
    #a09068 26%,#887850 42%,#706040 55%,
    #584830 70%,#403020 100%);
  border:2.5px solid #685840;
  box-shadow:0 3px 14px rgba(0,0,0,0.4);
  transform:rotateY(180deg);
}
.coin-3d .back .coin-hole{
  background:#403020;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.6),0 0 0 1.5px rgba(80,60,30,0.3);
}
.coin-3d.spinning{animation:coinSpin 2s ease-out}
/* 铜钱落地结果 */
.coin-3d.result-heads{
  animation:coinLandHeads 0.5s ease-out forwards;
}
.coin-3d.result-tails{
  animation:coinLandTails 0.5s ease-out forwards;
}
@keyframes coinSpin{
  0%{transform:rotateY(0) rotateX(0)}
  30%{transform:rotateY(720deg) rotateX(15deg)}
  60%{transform:rotateY(1440deg) rotateX(-8deg)}
  85%{transform:rotateY(1800deg) rotateX(2deg)}
  100%{transform:rotateY(1800deg) rotateX(0)}
}
@keyframes coinLandHeads{
  0%{transform:rotateY(1800deg)}
  100%{transform:rotateY(0deg)}
}
@keyframes coinLandTails{
  0%{transform:rotateY(1800deg)}
  100%{transform:rotateY(180deg)}
}

/* ── 起卦按钮 ── */
.shake-btn{
  display:inline-block;
  padding:1rem 3.5rem;
  font-family:"Ma Shan Zheng",cursive;
  font-size:1.3rem;
  color:#fff;
  letter-spacing:0.25em;
  background:linear-gradient(180deg,rgba(200,70,50,0.5),rgba(140,30,20,0.6));
  border:1.5px solid rgba(255,200,180,0.15);
  border-radius:4px;
  cursor:pointer;
  transition:all 0.4s;
  text-align:center;
  user-select:none;
  touch-action:manipulation;
  position:relative;
  overflow:hidden;
}
.shake-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  transform:translateX(-100%);
  transition:transform 0.6s;
}
.shake-btn:hover{
  border-color:rgba(255,200,180,0.35);
  box-shadow:0 0 50px var(--cinnabar-glow),0 0 100px rgba(200,70,50,0.1);
  transform:translateY(-2px);
}
.shake-btn:hover::before{transform:translateX(100%)}
.shake-btn:active{transform:scale(0.97)}
.shake-btn.disabled{
  pointer-events:none;opacity:0.4;filter:grayscale(0.5);
}
.shake-btn .count{
  font-family:"Inter","PingFang SC",sans-serif;
  font-size:0.9rem;font-weight:300;opacity:0.7;
}

.shake-hint{
  margin-top:0.8rem;
  font-size:0.8rem;
  color:var(--text-dim);
  font-weight:300;
  letter-spacing:0.06em;
  text-align:center;
}

/* ── 问卦输入 ── */
.question-box{
  width:100%;max-width:420px;
  margin:0 auto 1.5rem;
}
.question-box textarea{
  width:100%;
  padding:0.9rem 1.2rem;
  background:rgba(10,10,20,0.6);
  border:1px solid var(--border-gold);
  border-radius:6px;
  color:var(--text-bright);
  font-family:"Noto Serif SC","PingFang SC","Microsoft YaHei",serif;
  font-size:0.95rem;
  font-weight:300;
  line-height:1.7;
  resize:vertical;
  outline:none;
  transition:border-color 0.4s,box-shadow 0.4s;
}
.question-box textarea:focus{
  border-color:var(--gold-dim);
  box-shadow:0 0 20px rgba(200,160,60,0.08),inset 0 0 20px rgba(200,160,60,0.03);
}
.question-box textarea::placeholder{
  color:var(--text-muted);
  font-weight:300;
  letter-spacing:0.04em;
}
.question-hint{
  margin-top:0.5rem;
  font-size:0.74rem;
  color:var(--text-muted);
  font-weight:300;
  letter-spacing:0.04em;
  text-align:center;
}

/* ============================================================
   爻线展示区
   ============================================================ */
.lines-display{
  width:100%;max-width:420px;
  margin:1.5rem auto;
  display:flex;flex-direction:column;
  gap:6px;
}
.yao-line{
  display:flex;align-items:center;
  justify-content:center;
  gap:0.8rem;
  padding:0.6rem 1rem;
  position:relative;
  opacity:0;
  transform:translateY(20px);
}
.yao-line.revealed{
  animation:lineReveal 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
@keyframes lineReveal{
  to{opacity:1;transform:translateY(0)}
}
.yao-line .yao-label{
  font-size:0.72rem;color:var(--text-dim);
  width:28px;text-align:right;
  font-weight:300;letter-spacing:0.04em;
}
.yao-line .yao-symbol{
  font-size:1.8rem;letter-spacing:0.5em;
  min-width:160px;text-align:center;
  font-weight:700;
  position:relative;
}
.yao-line .yao-symbol.yang{
  color:var(--gold-bright);
  text-shadow:0 0 12px var(--gold-glow),0 0 30px rgba(200,160,50,0.1);
}
.yao-line .yao-symbol.yin{
  color:var(--text-muted);
  text-shadow:none;
}
.yao-line .yao-symbol .mark{
  position:absolute;
  right:-20px;
  font-size:0.9rem;
  font-weight:700;
}
.yao-line .yao-symbol .mark.lao-yang{color:var(--cinnabar);animation:markBreath 1.5s ease-in-out infinite}
.yao-line .yao-symbol .mark.lao-yin{color:var(--cinnabar);animation:markBreath 1.5s ease-in-out infinite}
@keyframes markBreath{
  0%,100%{opacity:0.5}
  50%{opacity:1;text-shadow:0 0 8px var(--cinnabar-glow)}
}
.yao-line .yao-result{
  font-size:0.78rem;color:var(--text-dim);
  min-width:60px;font-weight:300;
}

/* 涟漪效果 */
.line-ripple{
  position:absolute;inset:0;
  pointer-events:none;
}
.line-ripple::after{
  content:'';
  position:absolute;top:50%;left:50%;
  width:0;height:0;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,160,50,0.15) 0%,transparent 60%);
  animation:rippleOut 0.8s ease-out forwards;
}
@keyframes rippleOut{
  to{width:400px;height:200px;margin-left:-200px;margin-top:-100px;opacity:0}
}

/* ============================================================
   毛玻璃面板
   ============================================================ */
.glass-panel{
  width:100%;
  background:var(--surface);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:2.5rem 2rem;
  margin-bottom:1.5rem;
  position:relative;
  animation:panelIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.02);
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.glass-panel h2{
  font-family:"Ma Shan Zheng",cursive;
  font-size:1.4rem;color:var(--gold);
  margin-bottom:1.2rem;
  letter-spacing:0.15em;font-weight:400;
}
.glass-panel h3{
  font-family:"Noto Serif SC",serif;
  font-size:1rem;color:var(--gold-dim);
  margin-bottom:0.6rem;font-weight:500;
  letter-spacing:0.06em;
}

/* ── 主题按钮 ── */
.topic-row{
  display:flex;flex-wrap:wrap;gap:0.5rem;
  justify-content:center;
}
.topic-chip{
  padding:0.6rem 1rem;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:20px;
  background:transparent;
  color:var(--text-dim);
  cursor:pointer;
  font-family:"Inter","PingFang SC",sans-serif;
  font-size:0.82rem;font-weight:300;
  transition:all 0.35s;
  touch-action:manipulation;
}
.topic-chip:hover{border-color:rgba(200,160,60,0.3);color:var(--gold-dim)}
.topic-chip.active{
  border-color:rgba(200,160,60,0.5);
  color:var(--gold);
  background:rgba(200,160,60,0.06);
  font-weight:500;
}

/* ============================================================
   排盘表格
   ============================================================ */
.table-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  border:1px solid var(--border);
  border-radius:6px;
  margin-top:1rem;
}
.paipan-table{
  width:100%;border-collapse:collapse;
  font-size:0.82rem;min-width:500px;
}
.paipan-table th{
  background:rgba(10,10,18,0.9);
  color:var(--text-dim);
  padding:0.7rem 0.3rem;
  border-bottom:1px solid var(--border-gold);
  font-weight:400;font-size:0.76rem;
  letter-spacing:0.04em;white-space:nowrap;
}
.paipan-table td{
  padding:0.65rem 0.3rem;text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.02);
  white-space:nowrap;font-weight:300;color:var(--text);
}
.paipan-table tr.line-moving{
  background:rgba(200,70,50,0.04);
}
.paipan-table tr.line-moving td:first-child{
  border-left:2px solid var(--cinnabar);
}
.paipan-table .shi{color:#e07060;font-weight:600}
.paipan-table .ying{color:#6090c0;font-weight:600}

.tag{display:inline-block;padding:2px 8px;border-radius:2px;font-size:0.74rem;font-weight:500}
.tag-p{background:rgba(90,160,220,0.1);color:#7ab8f0}
.tag-b{background:rgba(220,150,60,0.1);color:#e0a850}
.tag-o{background:rgba(220,70,60,0.1);color:#e87060}
.tag-c{background:rgba(80,180,120,0.1);color:#60c090}
.tag-w{background:rgba(210,170,60,0.1);color:#d8b850}
.tag-q{background:rgba(80,180,120,0.07);color:#60c090}
.tag-z{background:rgba(220,70,60,0.07);color:#e87060}
.tag-g{background:rgba(220,150,60,0.07);color:#e0a850}
.tag-t{background:rgba(170,120,220,0.07);color:#b080e0}
.tag-bh2{background:rgba(140,150,170,0.07);color:#90a0b0}
.tag-x{background:rgba(90,160,220,0.07);color:#7ab8f0}

/* ── 卦名 ── */
.gua-names{
  text-align:center;margin-bottom:1.5rem;
}
.gua-name-main{
  font-family:"Ma Shan Zheng",cursive;
  font-size:2rem;color:var(--gold-bright);
  letter-spacing:0.2em;font-weight:400;
  text-shadow:0 0 40px var(--gold-glow);
}
.gua-name-arrow{color:var(--text-muted);font-size:1rem}
.gua-name-bian{
  font-family:"Ma Shan Zheng",cursive;
  font-size:2rem;color:var(--gold-bright);
  letter-spacing:0.2em;font-weight:400;
  text-shadow:0 0 40px var(--gold-glow);
}

/* ── 解读区块 ── */
.verdict-badge{
  display:inline-block;padding:0.5rem 2.5rem;border-radius:3px;
  font-family:"Ma Shan Zheng",cursive;
  font-size:1.6rem;font-weight:400;letter-spacing:0.3em;
}
.verdict-ji{background:rgba(80,180,120,0.08);color:#60c090;border:1px solid rgba(80,180,120,0.15);box-shadow:0 0 30px rgba(80,180,120,0.08)}
.verdict-ping{background:rgba(220,150,60,0.08);color:#e0a850;border:1px solid rgba(220,150,60,0.15);box-shadow:0 0 30px rgba(220,150,60,0.08)}
.verdict-xiong{background:rgba(220,70,60,0.08);color:#e87060;border:1px solid rgba(220,70,60,0.15);box-shadow:0 0 30px rgba(220,70,60,0.08)}

.interpret-section{
  padding:1.2rem 1.5rem;
  margin-bottom:0.8rem;
  border-left:2px solid rgba(255,255,255,0.05);
  border-radius:0 4px 4px 0;
  background:rgba(10,10,18,0.3);
  font-weight:300;
}
.interpret-section.highlight-baihua{
  border-left-color:var(--gold);
  background:rgba(200,160,60,0.03);
}
.interpret-section.highlight-verdict{
  border-left-color:rgba(96,192,144,0.3);
  background:rgba(96,192,144,0.02);
}
.interpret-section.highlight-advice{
  border-left-color:rgba(220,150,60,0.4);
  background:rgba(220,150,60,0.03);
}
.interpret-section p{line-height:2.1;color:var(--text)}
.interpret-section .highlight{color:var(--gold-bright);font-weight:500}
.interpret-section .small-note{font-size:0.78rem;color:var(--text-dim);margin-top:0.5rem}

/* ── 折叠区 ── */
.detail-toggle{
  cursor:pointer;padding:0.7rem 1rem;
  background:rgba(255,255,255,0.01);
  border-radius:4px;
  font-size:0.85rem;color:var(--text-dim);
  font-weight:300;letter-spacing:0.05em;
  transition:all 0.3s;
  text-align:center;user-select:none;
  margin-top:1rem;
}
.detail-toggle:hover{background:rgba(255,255,255,0.03);color:var(--text-bright)}
.detail-content{display:none;padding-top:0.5rem}

/* ── 页脚 ── */
.footer{
  text-align:center;padding:3rem 1.5rem;
  color:var(--text-muted);font-size:0.76rem;
  font-weight:300;letter-spacing:0.04em;
  opacity:0.4;
}

/* ── 滚动条 ── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.04);border-radius:2px}

/* ============================================================
   响应式
   ============================================================ */
@media(max-width:768px){
  .coin-3d{width:80px;height:80px}
  .coin-hole{width:20px;height:20px}
  .coin-char-top,.coin-char-bottom,.coin-char-left,.coin-char-right{font-size:0.72rem}
  .coin-char-top{top:13px}.coin-char-bottom{bottom:13px}
  .coin-char-left{left:15px}.coin-char-right{right:15px}
  .coin-stage{max-width:340px;margin:0.5rem auto 1.5rem}
  .shake-btn{font-size:1.1rem;padding:0.8rem 2.5rem}
  .glass-panel{padding:1.8rem 1.2rem}
  .yao-symbol{font-size:1.4rem!important;min-width:120px!important}
  .gua-name-main,.gua-name-bian{font-size:1.5rem}
}

@media(max-width:480px){
  html{font-size:15px}
  .nav{padding:1rem}
  .nav-logo{font-size:1.4rem}
  .coin-3d{width:65px;height:65px}
  .coin-hole{width:16px;height:16px}
  .coin-char-top,.coin-char-bottom,.coin-char-left,.coin-char-right{font-size:0.6rem}
  .coin-char-top{top:10px}.coin-char-bottom{bottom:10px}
  .coin-char-left{left:12px}.coin-char-right{right:12px}
  .coin-stage{max-width:280px}
  .shake-btn{font-size:1rem;padding:0.7rem 2rem;width:100%}
  .glass-panel{padding:1.4rem 1rem}
  .topic-row{gap:0.35rem}
  .topic-chip{font-size:0.74rem;padding:0.5rem 0.7rem}
  .yao-symbol{font-size:1.2rem!important;min-width:90px!important;letter-spacing:0.3em!important}
  .paipan-table{font-size:0.68rem;min-width:420px}
  .gua-name-main,.gua-name-bian{font-size:1.2rem}
  .verdict-badge{font-size:1.2rem;padding:0.4rem 1.5rem}
}
</style>
</head>
<body>

<!-- 粒子画布 -->
<canvas id="particleCanvas"></canvas>

<div id="app">

  <!-- 导航 -->
  <nav class="nav">
    <span class="nav-logo">玄 鉴</span>
  </nav>

  <!-- 主区域 -->
  <div class="main-content">

    <!-- ====== 铜钱 + 起卦 ====== -->
    <div class="glass-panel" style="text-align:center" id="shakePanel">
      <h2>焚香 · 起卦</h2>
      <div class="coin-stage">
        <div class="coins-row" id="coinsRow">
          <div class="coin-3d" id="coin0">
            <div class="face front">

/* ================================================================
   CANVAS 粒子系统 · 星宿 + 香火轨迹
   ================================================================ */
const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
let W,H,particles=[],mouse={x:-999,y:-999},mouseActive=false;

function resizeCanvas(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
}
resizeCanvas();window.addEventListener('resize',resizeCanvas);

// 背景星宿
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*0.15,vy:(Math.random()-.5)*0.15,
    r:Math.random()*1.2+0.3,
    alpha:Math.random()*0.5+0.2,
    twinkle:Math.random()*Math.PI*2,
    type:'star'
  });
}
// 鼠标轨迹粒子池
const trailParticles=[];
const MAX_TRAIL=40;

document.addEventListener('mousemove',e=>{
  mouse.x=e.clientX;mouse.y=e.clientY;
  mouseActive=true;
  trailParticles.push({x:e.clientX,y:e.clientY,life:1,vy:-0.3-Math.random()*0.5,vx:(Math.random()-.5)*0.4,r:Math.random()*2+1});
  if(trailParticles.length>MAX_TRAIL)trailParticles.shift();
});
document.addEventListener('mouseleave',()=>{mouseActive=false});
// 移动端触摸
document.addEventListener('touchmove',e=>{
  mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;mouseActive=true;
  trailParticles.push({x:mouse.x,y:mouse.y,life:1,vy:-0.3-Math.random()*0.5,vx:(Math.random()-.5)*0.4,r:Math.random()*2+1});
  if(trailParticles.length>MAX_TRAIL)trailParticles.shift();
},{passive:true});
document.addEventListener('touchend',()=>{mouseActive=false});

// 起卦爆发粒子
let burstParticles=[];
function spawnBurst(x,y,count=60){
  for(let i=0;i<count;i++){
    const angle=Math.random()*Math.PI*2,speed=Math.random()*4+1;
    burstParticles.push({
      x,y,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,
      r:Math.random()*2.5+0.5,
      life:1,decay:0.008+Math.random()*0.015,
      type:'burst'
    });
  }
}

function animateParticles(){
  ctx.clearRect(0,0,W,H);

  // 背景星宿
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    p.twinkle+=0.015;
    const a=p.alpha+Math.sin(p.twinkle)*0.15;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,170,80,${a})`;ctx.fill();
  });

  // 鼠标轨迹 (香火)
  for(let i=0;i<trailParticles.length;i++){
    const tp=trailParticles[i];
    tp.x+=tp.vx;tp.y+=tp.vy;tp.life-=0.012;
    if(tp.life<=0){trailParticles.splice(i,1);i--;continue}
    ctx.beginPath();ctx.arc(tp.x,tp.y,tp.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(220,180,80,${tp.life*0.35})`;ctx.fill();
  }

  // 爆发粒子
  for(let i=0;i<burstParticles.length;i++){
    const bp=burstParticles[i];
    bp.x+=bp.vx;bp.y+=bp.vy;bp.vy+=0.03;bp.life-=bp.decay;
    if(bp.life<=0){burstParticles.splice(i,1);i--;continue}
    ctx.beginPath();ctx.arc(bp.x,bp.y,bp.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(240,200,100,${bp.life*0.7})`;ctx.fill();
  }

  requestAnimationFrame(animateParticles);
}
animateParticles();

function getChangedTrigrams(lines){
  let u=[0,0,0],l=[0,0,0],ub=[0,0,0],lb=[0,0,0];
  for(let i=0;i<6;i++){
    const y=lines[i].value===7||lines[i].value===9;
    const yb=lines[i].value===6?true:(lines[i].value===9?false:y);
    i<3?(l[i]=y?1:0,lb[i]=yb?1:0):(u[i-3]=y?1:0,ub[i-3]=yb?1:0);
  }
  return{upper:TG.get(u.join('')),lower:TG.get(l.join('')),upperBian:TG.get(ub.join('')),lowerBian:TG.get(lb.join(''))};
}
function getBranches(hex){return[...TRIGRAM_NAJIA[hex.lower].inner,...TRIGRAM_NAJIA[hex.upper].outer]}
function getLiuQin(palace,branch){
  const me=TRIGRAM_ELEMENTS[palace],ta=BRANCH_ELEMENT[branch];
  if(me===ta)return'兄弟';if(G[me]===ta)return'子孙';if(O2[me]===ta)return'妻财';if(G[ta]===me)return'父母';if(O2[ta]===me)return'官鬼';return'兄弟';
}
function getLiuShen(dg){const s=SIX_GOD_START[dg]||0,r=[];for(let i=0;i<6;i++)r.push(SIX_GODS[(s+i)%6]);return r}
let _dc=null;
function getDayGanZhi(){
  const t=new Date(),tk=`${t.getFullYear()}-${t.getMonth()}-${t.getDate()}`;
  if(_dc&&_dc.key===tk)return _dc;
  const r=new Date(2000,0,1),df=Math.floor((t.getTime()-r.getTime())/86400000);
  const idx=((54+df)%60+60)%60,st=HEAVENLY_STEMS[idx%10],br=EARTHLY_BRANCHES[idx%12];
  const xs=Math.floor(idx/10)*10,xb=[];for(let i=0;i<10;i++)xb.push((xs+i)%12);
  const kb=[];for(let i=0;i<12;i++)if(!xb.includes(i))kb.push(EARTHLY_BRANCHES[i]);
  return _dc={key:tk,stem:st,branch:br,ganzhi:st+br,cycleIdx:idx,kongBranches:kb};
}
function getDayGan(){return getDayGanZhi().stem}

function computePaipan(benHex,lines){
  const tr=getChangedTrigrams(lines),bg=HM.get(`${tr.upper},${tr.lower}`);if(!bg)return null;
  const brs=getBranches(bg),dg=getDayGan(),ls=getLiuShen(dg),lq=brs.map(b=>getLiuQin(bg.palace,b));
  const sy=Array(6).fill('');sy[bg.shi-1]='世';sy[(bg.shi-1+3)%6]='应';
  let bh=null,bbr=null,blq=null,bsy=null;
  const hm=lines.some(l=>l.value===6||l.value===9);
  if(hm){bh=HM.get(`${tr.upperBian},${tr.lowerBian}`);if(bh){bbr=getBranches(bh);blq=bbr.map(b=>getLiuQin(bg.palace,b));bsy=Array(6).fill('');bsy[bh.shi-1]='世';bsy[(bh.shi-1+3)%6]='应'}}
  return{benHex:bg,branches:brs,liuqin:lq,liushen:ls,shiYing:sy,bianHex:bh,bianBranches:bbr,bianLiuqin:blq,bianShiYing:bsy,lines,dg,hasMoving:hm};
}

/* ─── 解读 ─── */
const YS={wealth:'妻财',love:'官鬼',career:'官鬼',health:'子孙',study:'父母',family:'子孙'};
function getYongShen(t){return YS[t]||null}

function analyzeVerdict(pp,topic){
  let s=0;const ys=getYongShen(topic),si=pp.benHex.shi-1;
  if(ys){const yi=pp.liuqin.findIndex(q=>q===ys);if(yi>=0){s+=2;if(pp.lines[yi].value===6||pp.lines[yi].value===9)s+=1;if(yi===si)s+=2}}
  const se=BRANCH_ELEMENT[pp.branches[si]],pe=TRIGRAM_ELEMENTS[pp.benHex.palace];
  if(G[se]===pe)s+=2;else if(pe===se)s+=1;
  const dc=pp.lines.filter(l=>l.value===6||l.value===9).length;
  if(dc===0)s+=1;else if(dc===1)s+=1;else if(dc>=3)s-=1;
  if(pp.benHex.type===6)s-=1;if(pp.benHex.type===7)s+=1;
  if(s>=5)return{level:'吉',css:'verdict-ji',text:'吉'};if(s>=2)return{level:'平',css:'verdict-ping',text:'平'};return{level:'凶',css:'verdict-xiong',text:'凶'};
}

/* ─── 六爻解卦：按用神→旺衰→动爻→世应四步推演 ─── */

/* 构建解卦核心：针对问题，给出具体分析 */
function buildInterpretation(pp,question){
  const si=pp.benHex.shi-1;       // 世爻位置
  const yi=(si+3)%6;              // 应爻位置
  const yn=['初','二','三','四','五','上'];
  const dc=pp.lines.filter(l=>l.value===6||l.value===9).length;
  const gz=getDayGanZhi();

  // --- 1. 本卦寓意 ---
  const guaDesc=BAIHUA[pp.benHex.name]||'卦象独特，需结合自身情况分析。';

  // --- 2. 世爻分析：你的处境 ---
  const se=BRANCH_ELEMENT[pp.branches[si]];
  const ye=BRANCH_ELEMENT[pp.branches[yi]];
  const dayEl=BRANCH_ELEMENT[gz.branch];
  const siKong=gz.kongBranches.includes(pp.branches[si]);
  const siWang=(G[dayEl]===se)?'得日生，旺':'';
  const siRuo=(O2[dayEl]===se)?'被日克，偏弱':'';

  let shiTalk=`<p><b style="color:var(--gold-bright)">世爻在${yn[si]}爻</b>（${pp.branches[si]}·${se}）——代表<b>你自己</b>。`;
  if(siKong)shiTalk+='世爻旬空——你心里没底，状态不在线。';
  else if(siWang)shiTalk+='世爻得日辰生扶——你底气足，能扛事。';
  else if(siRuo)shiTalk+='世爻被日辰克制——你有点被动，力不从心。';
  else shiTalk+='世爻平和——状态尚可。';
  shiTalk+='</p>';

  // --- 3. 六亲信号：卦告诉你什么 ---
  const liuqinTalk=[];
  const liuqinNames={父母:'文书/长辈/考试',兄弟:'朋友/竞争/破费',官鬼:'事业/是非/压力',妻财:'钱财/感情',子孙:'福气/健康/解忧'};
  for(let i=0;i<6;i++){
    const lq=pp.liuqin[i];
    if(lq==='官鬼'||lq==='妻财'||lq==='父母'||lq==='子孙'){
      const isDong=pp.lines[i].value===6||pp.lines[i].value===9;
      const isKong=gz.kongBranches.includes(pp.branches[i]);
      if(isDong||i===si||isKong){
        let t=`<b>${yn[i]}爻${lq}</b>（${liuqinNames[lq]||lq}）`;
        if(isDong)t+=` <span style="color:var(--cinnabar)">发动</span>——`;
        else if(i===si)t+=' 持世——';
        else t+='——';
        if(lq==='官鬼'){
          if(isDong&&pp.lines[i].value===9)t+='事业有变，可能升迁或换岗。';
          else if(isDong&&pp.lines[i].value===6)t+='事业有阻力，注意小人。';
          else t+='事业方面需要留意。';
        }else if(lq==='妻财'){
          if(isDong&&pp.lines[i].value===9)t+='财运有起色，可能有进账。';
          else if(isDong&&pp.lines[i].value===6)t+='财运有损耗，注意破财。';
          else t+='钱财方面可以关注。';
        }else if(lq==='父母'){
          t+='文书/学业方面有利。';
        }else if(lq==='子孙'){
          t+='福气护身，烦恼可解。';
        }
        if(i===si)t+=' <span style="font-size:0.8rem;color:#e87060">[持世]</span>';
        liuqinTalk.push(`<p style="margin-top:0.2rem">${t}</p>`);
      }
    }
  }
  if(!liuqinTalk.length)liuqinTalk.push('<p>卦象安静，各爻平和无特殊信号。</p>');

  // --- 4. 动爻分析：什么在变 ---
  let dongTalk='';
  if(dc===0){
    dongTalk='<p>此卦<b>安静无动爻</b>——事情平稳，暂无大的变动。该怎样就怎样，顺势而为即可。</p>';
  }else{
    const dl=[];pp.lines.forEach((l,i)=>{if(l.value===6||l.value===9)dl.push(i)});
    dongTalk=`<p>卦中<b style="color:var(--cinnabar)">${dc}个爻在动</b>，说明事情正在变化：</p>`;
    dl.forEach(i=>{
      const ct=pp.lines[i].value===9?'老阳○→阴（由好转弱）':'老阴×→阳（由弱转强）';
      dongTalk+=`<p style="margin-top:0.2rem">→ <b>${yn[i]}爻动</b>（${pp.liuqin[i]}·${pp.branches[i]}）：${ct}${pp.shiYing[i]==='世'?' <span style="color:#e87060">[事关你自身]</span>':''}</p>`;
    });
  }

  // --- 5. 世应关系：你与环境 ---
  let shiyingTalk='';
  if(G[se]===ye)shiyingTalk='你主动付出，推动局面。';
  else if(G[ye]===se)shiyingTalk='环境对你有助力，得人相助。';
  else if(O2[se]===ye)shiyingTalk='你能掌控局面，主动权在你。';
  else if(O2[ye]===se)shiyingTalk='环境对你不利，阻力较大，别硬来。';
  else shiyingTalk='你与环境势均力敌，合作顺畅。';

  // --- 6. 综合直断 ---
  let zhijie='';
  if(dc===0){
    zhijie='卦象安静，事情不会自己动。关键看你做不做，不做就不会变。';
  }else{
    zhijie='此卦有动就有变数——结果不固定，看你怎么应对。大体走向上面已经分析了。';
  }

  return{guabg:guaDesc,shiTalk,liuqinTalk:liuqinTalk.join(''),dongTalk,shiyingTalk,zhijie,dc};
}

function getDongYaoAnalysis(pp){
  const dl=[];pp.lines.forEach((l,i)=>{if(l.value===6||l.value===9)dl.push(i)});
  if(!dl.length)return'<p>此卦安静，无动爻。事态平稳。</p>';
  const yn=['初','二','三','四','五','上'];let h2='';
  dl.forEach(i=>{const ct=pp.lines[i].value===6?'老阴×→阳':'老阳○→阴';h2+=`<p><strong style="color:var(--cinnabar)">${yn[i]}爻动</strong> ${ct} · ${pp.liuqin[i]} · ${pp.branches[i]}${pp.shiYing[i]==='世'?' <span style="color:#e87060">[世爻]</span>':''}</p>`});
  return h2;
}
function toggleDetail(el){
  const content=el.nextElementSibling;
  if(content.style.display==='block'){content.style.display='none';el.textContent='📖 展开卦盘详情 ↓'}
  else{content.style.display='block';el.textContent='📖 收起卦盘详情 ↑'}
}

/* ─── 构建 AI 解卦 Prompt ─── */
function buildAIPrompt(pp,question){
  const yn=['初','二','三','四','五','上'];
  const dc=pp.lines.filter(l=>l.value===6||l.value===9).length;
  const gz=getDayGanZhi();

  let p=`【起卦时间】${gz.ganzhi}（${gz.stem}日）\n\n`;
  p+=`【本卦】${pp.benHex.name} ${TRIGRAM_SYMBOLS[pp.benHex.upper]}${TRIGRAM_SYMBOLS[pp.benHex.lower]} · ${TRIGRAM_NAMES[pp.benHex.palace]}宫属${TRIGRAM_ELEMENTS[pp.benHex.palace]}\n`;
  p+=`卦辞：${pp.benHex.desc}\n`;
  p+=`六爻白话：${BAIHUA[pp.benHex.name]||''}\n`;

  if(pp.hasMoving&&pp.bianHex){
    p+=`\n【变卦】${pp.bianHex.name} ${TRIGRAM_SYMBOLS[pp.bianHex.upper]}${TRIGRAM_SYMBOLS[pp.bianHex.lower]} · ${TRIGRAM_NAMES[pp.bianHex.palace]}宫属${TRIGRAM_ELEMENTS[pp.bianHex.palace]}\n`;
    p+=`变卦卦辞：${pp.bianHex.desc}\n`;
  }

  p+=`\n【六爻排盘】\n`;
  for(let i=5;i>=0;i--){
    const v=pp.lines[i].value;
    let yao=v===7||v===9?'━━━━━':'━━  ━━';
    if(v===9)yao+=' ○';
    if(v===6)yao+=' ×';
    let mark='';if(pp.shiYing[i]==='世')mark=' [世]';if(pp.shiYing[i]==='应')mark=' [应]';

    let dong='';
    if(v===9)dong='老阳→阴';
    if(v===6)dong='老阴→阳';

    p+=`${yn[5-i]}爻：${pp.branches[i]}（${BRANCH_ELEMENT[pp.branches[i]]}）· ${pp.liuqin[i]} · ${pp.liushen[i]}${mark}  ${yao}  ${dong}\n`;
  }

  if(dc===0)p+=`\n此卦安静，${dc}个动爻。`;
  else p+=`\n共${dc}个爻发动。`;

  p+=`\n【世爻】第${pp.benHex.shi}爻为世爻（代表问卦人自身）。`;

  // 旬空
  const kb=gz.kongBranches;const kl=[];
  for(let i=0;i<6;i++)if(kb.includes(pp.branches[i]))kl.push(`${yn[5-i]}爻${pp.branches[i]}`);
  if(kl.length)p+=`\n【旬空】${kl.join('、')}（这些爻暂时无力，出空后发力）。`;

  return p;
}

/* ─── AI 自动解卦 ─── */
async function askAI(){
  const loading=$('aiLoading');
  const content=$('aiContent');
  const error=$('aiError');
  if(!loading||!content||!error)return; // 还没渲染完

  const prompt=buildAIPrompt(state.paipan,state.question);
  const question=state.question||'综合运势';

  try{
    const resp=await fetch('/api/interpret',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question,prompt})
    });
    const data=await resp.json();
    if(data.error){
      loading.style.display='none';
      error.style.display='';
    }else{
      loading.style.display='none';
      content.style.display='';
      content.innerHTML=`<p style="line-height:2.1;color:var(--text-bright)">${data.result.replace(/\n/g,'<br>')}</p>`;
    }
  }catch(e){
    loading.style.display='none';
    error.style.display='';
  }
}

async function retryAI(){
  const loading=$('aiLoading');
  const content=$('aiContent');
  const error=$('aiError');
  loading.style.display='';
  content.style.display='none';
  error.style.display='none';
  askAI();
}

/* ================================================================
   UI 控制 · 起卦流程
   ================================================================ */
let state={topic:'general',question:'',lines:[],shakeCount:0,paipan:null,shaking:false};

function $(id){return document.getElementById(id)}

// 页面初始化
document.addEventListener('DOMContentLoaded',()=>{
  renderLines();
});

// 手机摇晃支持
if(window.DeviceMotionEvent){
  let lastShake=0;
  window.addEventListener('devicemotion',e=>{
    const acc=e.accelerationIncludingGravity;
    if(!acc)return;
    const force=Math.sqrt(acc.x*acc.x+acc.y*acc.y+acc.z*acc.z);
    if(force>25&&Date.now()-lastShake>2500&&state.shakeCount<6&&!state.shaking){
      lastShake=Date.now();doShake();
    }
  });
}

function tossCoins(){
  const c=[];for(let i=0;i<3;i++)c.push(Math.random()<0.5?3:2);
  const t=c.reduce((a,b)=>a+b,0);
  return{coins:c,value:t===9?9:t===6?6:t===7?7:8};
}

function resetCast(){
  state.lines=[];
  state.shakeCount=0;
  state.shaking=false;
  renderLines();
  $('shakeNum').textContent='0';
  $('btnShakeText').textContent='起 卦';
  $('btnShake').classList.remove('disabled');
  $('shakeHint').textContent='点击起卦 · 心念专注所问之事';
  ['coin0','coin1','coin2'].forEach(id=>{
    const c=$(id);
    if(c){c.classList.remove('result-heads','result-tails','spinning');}
  });
  // 隐藏排盘解读面板
  $('paipanPanel').style.display='none';
  $('interpretPanel').style.display='none';
  state.paipan=null;
}

async function doShake(){
  // 如果已经完成6次，先重置再开始新一轮
  if(state.shakeCount>=6){resetCast();}
  if(state.shaking)return;
  state.shaking=true;
  // 第一爻摇出时，锁定本次问题
  if(state.shakeCount===0){
    state.question=$('questionInput').value.trim();
  }
  const btn=$('btnShake');btn.classList.add('disabled');

  // 三枚铜钱一起旋转
  const coins=[$('coin0'),$('coin1'),$('coin2')];
  coins.forEach(c=>{c.classList.remove('spinning');void c.offsetWidth;c.classList.add('spinning')});

  // 爆发粒子
  const rect=$('coinsRow').getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  spawnBurst(cx,cy,60);

  // 屏幕变暗
  $('shakePanel').style.boxShadow='inset 0 0 120px rgba(0,0,0,0.5)';
  setTimeout(()=>{$('shakePanel').style.boxShadow=''},1500);

  // 等待2秒
  await new Promise(r=>setTimeout(r,2000));

  // 三枚铜钱分别落出正反面
  const{coins:coinVals,value}=tossCoins();
  coins.forEach((c,i)=>{
    c.classList.remove('spinning');
    // coinVals[i]=3 → 阳面(正面/汉字面), coinVals[i]=2 → 阴面(背面/满文面)
    if(coinVals[i]===3){
      c.classList.add('result-heads');
      c.classList.remove('result-tails');
    }else{
      c.classList.add('result-tails');
      c.classList.remove('result-heads');
    }
  });

  // 生成一爻
  state.lines[state.shakeCount]={value};state.shakeCount++;
  renderLines();
  const lineEls=document.querySelectorAll('.yao-line');
  const newLine=lineEls[5-state.shakeCount+1];
  if(newLine){newLine.classList.add('revealed');const ripple=document.createElement('div');ripple.className='line-ripple';newLine.appendChild(ripple);setTimeout(()=>ripple.remove(),800)}
  $('shakeNum').textContent=state.shakeCount;

  if(state.shakeCount>=6){
    $('btnShakeText').textContent='起卦完成';
    $('shakeHint').textContent='卦成 · 天机已现';
    state.shaking=false;
    setTimeout(()=>{
      doPaipan();
      $('btnShakeText').textContent='重新起卦';
      $('btnShake').classList.remove('disabled');
    },600);
  }else{
    btn.classList.remove('disabled');state.shaking=false;
    setTimeout(()=>coins.forEach(c=>{c.classList.remove('result-heads','result-tails','spinning')}),1200);
  }
}

function renderLines(){
  const yn=['上爻','五爻','四爻','三爻','二爻','初爻'];
  let h='';
  for(let i=5;i>=0;i--){
    const line=state.lines[i];
    let sym='',res='',symCls='',mark='';
    if(line!==undefined){
      if(line.value===7){sym='━━━━━';res='少阳 —';symCls='yang'}
      else if(line.value===8){sym='━━  ━━';res='少阴 --';symCls='yin'}
      else if(line.value===9){sym='━━━━━';res='老阳';symCls='yang';mark='<span class="mark lao-yang">○</span>'}
      else{sym='━━  ━━';res='老阴';symCls='yin';mark='<span class="mark lao-yin">×</span>'}
    }else{sym='· · · · ·';res='';symCls=''}
    h+=`<div class="yao-line${line!==undefined?' revealed':''}">
      <span class="yao-label">${yn[5-i]}</span>
      <span class="yao-symbol ${symCls}">${sym}${mark}</span>
      <span class="yao-result">${res}</span>
    </div>`;
  }
  $('linesDisplay').innerHTML=h;
}

function doPaipan(){
  const tr=getChangedTrigrams(state.lines),bh=HM.get(`${tr.upper},${tr.lower}`);
  if(!bh){alert('无法识别卦象。');return}
  const pp=computePaipan(bh,state.lines);state.paipan=pp;
  renderPaipan(pp);
  $('interpretContent').innerHTML=renderInterpretation(pp,state.topic,state.question);

  // 显示面板
  $('paipanPanel').style.display='';
  $('interpretPanel').style.display='';
  $('paipanPanel').scrollIntoView({behavior:'smooth',block:'start'});

  // 自动触发 AI 解卦
  setTimeout(()=>askAI(),300);
}

function renderPaipan(pp){
  $('benName').textContent=pp.benHex.name+' '+TRIGRAM_SYMBOLS[pp.benHex.upper]+TRIGRAM_SYMBOLS[pp.benHex.lower];
  if(pp.hasMoving&&pp.bianHex){$('arrowDivider').style.display='';$('bianName').style.display='';$('bianName').textContent=pp.bianHex.name+' '+TRIGRAM_SYMBOLS[pp.bianHex.upper]+TRIGRAM_SYMBOLS[pp.bianHex.lower]}
  else{$('arrowDivider').style.display='none';$('bianName').style.display='none'}
  const yn=['上','五','四','三','二','初'];let h='';
  for(let i=5;i>=0;i--){
    const im=pp.lines[i].value===6||pp.lines[i].value===9,by=pp.lines[i].value===7||pp.lines[i].value===9;
    let bs=by?'━━━━━':'━━  ━━';if(pp.lines[i].value===9)bs+=' ○';if(pp.lines[i].value===6)bs+=' ×';
    let vs='';if(pp.hasMoving&&pp.bianHex)vs=(pp.lines[i].value===6?true:(pp.lines[i].value===9?false:by))?'━━━━━':'━━  ━━';
    const qc='tag tag-'+(pp.liuqin[i]==='父母'?'p':pp.liuqin[i]==='兄弟'?'b':pp.liuqin[i]==='官鬼'?'o':pp.liuqin[i]==='子孙'?'c':'w');
    const st='tag tag-'+(pp.liushen[i]==='青龙'?'q':pp.liushen[i]==='朱雀'?'z':pp.liushen[i]==='勾陈'?'g':pp.liushen[i]==='螣蛇'?'t':pp.liushen[i]==='白虎'?'bh2':'x');
    let sy='';if(pp.shiYing[i]==='世')sy='<span class="shi">世</span>';else if(pp.shiYing[i]==='应')sy='<span class="ying">应</span>';
    h+=`<tr class="${im?'line-moving':''}"><td>${yn[5-i]}爻</td><td>${pp.branches[i]}（${BRANCH_ELEMENT[pp.branches[i]]}）</td><td><span class="${qc}">${pp.liuqin[i]}</span></td><td><span class="${st}">${pp.liushen[i]}</span></td><td>${sy}</td><td style="font-family:monospace">${bs}</td><td style="font-family:monospace">${vs}</td></tr>`;
  }
  $('paipanBody').innerHTML=h;
  $('pGong').textContent=TRIGRAM_NAMES[pp.benHex.palace]+'宫（属'+TRIGRAM_ELEMENTS[pp.benHex.palace]+'）';
  $('pDayGan').textContent=pp.dg+'日';
  $('pDong').textContent=pp.lines.filter(l=>l.value===6||l.value===9).length||'无';
}
</script>
